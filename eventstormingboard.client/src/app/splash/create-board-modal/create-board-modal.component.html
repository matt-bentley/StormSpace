<h1 mat-dialog-title>Create Storm Board</h1>
<form (ngSubmit)="onSave()" #noteForm="ngForm">
  <div mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>Board Name</mat-label>
      <input matInput [(ngModel)]="data.name" name="name" required />
      @if (noteForm.controls['name']?.invalid && noteForm.controls['name']?.touched) {
        <mat-error>
          Board Name is required.
        </mat-error>
      }
    </mat-form-field>
    <div class="warning-text">Warning! Storm boards self-destruct in 1 hour if not used.</div>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="noteForm.invalid" cdkFocusInitial>Create</button>
  </div>
</form>
