<h1 mat-dialog-title>Select a Board</h1>
<div mat-dialog-content>
  <mat-form-field appearance="outline">
    <mat-label>Board Name</mat-label>
    <mat-select [(value)]="selectedBoardId">
      @for (board of boards; track board) {
        <mat-option [value]="board.id">
          {{ board.name }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!selectedBoardId" (click)="onSelect()">Select</button>
</div>
