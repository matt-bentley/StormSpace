<h1 mat-dialog-title>Board Context for AI</h1>
<form (ngSubmit)="onSave()" #contextForm="ngForm">
  <div mat-dialog-content>
    <p class="description">Provide context about your domain and session to help the AI agent make better suggestions.</p>

    <mat-form-field appearance="outline">
      <mat-label>Domain</mat-label>
      <textarea matInput [(ngModel)]="data.domain" name="domain" rows="3"
        placeholder="Describe the business domain — what the system does, key actors, and processes. E.g., 'E-commerce marketplace for handmade goods. Sellers list products, buyers browse and purchase.'"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Session Scope</mat-label>
      <textarea matInput [(ngModel)]="data.sessionScope" name="sessionScope" rows="3"
        placeholder="What is this event storming session focused on? Which bounded context or process flow? E.g., 'Order fulfillment — from order placement through to delivery confirmation.'"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Agent Instructions</mat-label>
      <textarea matInput [(ngModel)]="data.agentInstructions" name="agentInstructions" rows="3"
        placeholder="How should the AI agent behave? E.g., 'Be critical of naming. Challenge vague events. Suggest missing aggregates. Focus on the happy path first.'"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Workshop Phase</mat-label>
      <mat-select [(ngModel)]="data.phase" name="phase">
        <mat-option [value]="''">None (unset)</mat-option>
        @for (p of phases; track p.value) {
          <mat-option [value]="p.value">{{ p.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" cdkFocusInitial>Save</button>
  </div>
</form>
